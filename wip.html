<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RedBean Guild — Building in Progress</title>
  <!-- Redirect: WIP page is no longer used, send to login -->
  <script>window.location.href = 'login.html' + window.location.hash;</script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Bebas+Neue&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --accent: #C8102E;
      --bg: #0D0D0D;
      --text: #F5F5F0;
      --text-dim: rgba(245, 245, 240, 0.45);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* Grain texture overlay — same as main site */
    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans JP', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      background-size: 200px 200px;
      pointer-events: none;
      z-index: 0;
      opacity: 0.6;
    }

    /* Subtle red glow in corner */
    body::after {
      content: '';
      position: fixed;
      top: -20%;
      right: -10%;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(200, 16, 46, 0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .content {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 40px 24px;
      max-width: 560px;
    }

    /* Small red top rule */
    .rule {
      width: 32px;
      height: 2px;
      background-color: var(--accent);
      margin: 0 auto 32px;
    }

    .label {
      font-size: 10px;
      letter-spacing: 0.3em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 24px;
      font-family: 'Noto Sans JP', sans-serif;
      font-weight: 300;
    }

    .heading {
      font-family: 'Instrument Serif', Georgia, serif;
      font-size: clamp(48px, 10vw, 80px);
      line-height: 0.95;
      letter-spacing: 0.02em;
      color: var(--text);
      margin-bottom: 28px;
    }

    .subtext {
      font-size: 11px;
      letter-spacing: 0.18em;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 48px;
      line-height: 2;
    }

    /* X (Twitter) link */
    .x-link {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text);
      text-decoration: none;
      border: 1px solid rgba(245, 245, 240, 0.15);
      padding: 12px 20px;
      margin-bottom: 32px;
      transition: border-color 0.2s ease, color 0.2s ease;
    }

    .x-link:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .x-icon {
      width: 14px;
      height: 14px;
      fill: currentColor;
      flex-shrink: 0;
    }

    /* Back to home link */
    .back-link {
      display: block;
      font-size: 9px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--text-dim);
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .back-link:hover {
      color: var(--text);
    }
  </style>
</head>
<body>
  <div class="content">
    <div class="rule"></div>
    <div class="label">RedBean Guild</div>
    <h1 class="heading">Building<br>in Progress</h1>
    <p class="subtext">
      Come back soon.<br>もうすぐ。
    </p>

    <!-- X (Twitter) link -->
    <a href="https://x.com/redbeanguild" target="_blank" rel="noopener noreferrer" class="x-link">
      <!-- X logo SVG -->
      <svg class="x-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.73-8.835L1.254 2.25H8.08l4.253 5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
      </svg>
      Follow @redbeanguild
    </a>

    <!-- Back to home -->
    <a href="index.html" class="back-link">← Back to home</a>
  </div>
</body>
</html>
